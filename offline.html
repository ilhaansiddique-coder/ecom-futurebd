<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c32c30" />
    <title>Offline | FutureBD</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Geist, system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(195, 44, 48, 0.14), transparent 28%),
          linear-gradient(180deg, #f7f8fb 0%, #eef1f6 100%);
        color: #151923;
      }

      .card {
        width: min(92vw, 28rem);
        padding: 2rem;
        border-radius: 1.5rem;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 30px 80px -50px rgba(15, 23, 42, 0.45);
        text-align: center;
      }

      .badge {
        width: 4rem;
        height: 4rem;
        margin: 0 auto 1rem;
        border-radius: 1.25rem;
        display: grid;
        place-items: center;
        background: rgba(195, 44, 48, 0.12);
        color: #c32c30;
        font-weight: 800;
        font-size: 1.25rem;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.75rem, 5vw, 2.25rem);
      }

      p {
        margin: 0 0 1.5rem;
        line-height: 1.6;
        color: #5c6476;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        padding: 0 1.25rem;
        border-radius: 9999px;
        background: #c32c30;
        color: white;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">F</div>
      <h1>You're offline</h1>
      <p>FutureBD is cached for faster return visits, but this page needs a connection. Reconnect and try again.</p>
      <a href="/">Reload app</a>
    </main>
  </body>
</html>
